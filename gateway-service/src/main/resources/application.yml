server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        register: true
        prefer-ip-address: true
        ip-address: 10.0.9.111
        health-check-path: /actuator/health
        health-check-interval: 15s

    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      routes:
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/order-service/**
          filters:
            - StripPrefix=1
            - AddRequestHeader=X-Gateway-Forwarded, true
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user-service/**
          filters:
            - StripPrefix=1
            - AddRequestHeader=X-Gateway-Forwarded, true
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG     # 查看网关向下游发出的 HTTP 请求
    org.springframework.http.server.reactive: DEBUG  # 查看请求/响应详情
