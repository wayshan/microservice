# ============================
# 用户服务配置
# ============================

server:
  # 服务端口
  port: 8001

spring:
  application:
    # 服务名称，用于 Consul 注册
    name: user-service
  config:
    import: 'optional:consul:'
  # --- 达梦数据源配置 ---
  datasource:
    driver-class-name: dm.jdbc.driver.DmDriver                                          # 达梦 JDBC 驱动
    url: jdbc:dm://10.0.9.111:5236?schema=TEST&columnNameUpperCase=false&columnNameCase=lower  # 数据库连接地址
    username: SYSDBA    # 数据库用户名
    password: SYSDBA    # 数据库密码

  cloud:
    # --- Consul 服务发现配置 ---
    consul:
      host: localhost          # Consul 服务端地址
      port: 8500               # Consul 默认端口
      discovery:
        register: true         # 是否注册到 Consul
        prefer-ip-address: true # 使用 IP 注册
        ip-address: 10.0.9.111 # 注册到 Consul 的 IP 地址
        health-check-path: /actuator/health   # 健康检查路径
        health-check-interval: 15s            # 健康检查间隔
      config:
        enabled: true              # 启用 Consul 配置中心
        format: YAML               # 将 KV Value 按 YAML 格式解析
        default-context: application  # 共享配置前缀（所有服务通用）
        data-key: data             # 存放 YAML 内容的 Key 名
        watch:
          enabled: true            # 启用配置变更监听（动态刷新）
          delay: 10000             # 变更检查间隔（毫秒）

# ============================
# 链路追踪配置（Zipkin）
# ============================
management:
  tracing:
    sampling:
      probability: 1.0              # 采样率 100%（生产环境建议 0.1）
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans  # Zipkin Server 地址

# ============================
# 日志配置（日志格式必须本地配置，Consul KV 加载时日志系统已初始化）
# ============================
logging:
  pattern:
    level: '%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-}]'

# ============================
# MyBatis-Plus 配置
# ============================
mybatis-plus:
  configuration:
    # 驼峰命名自动映射（数据库下划线 → Java 驼峰）
    map-underscore-to-camel-case: true
    # SQL 日志输出到控制台（开发调试用）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键策略：数据库自增
      id-type: auto
      # 表名格式：双引号包裹（达梦数据库大小写敏感，需加双引号保持大写）
      table-format: "\"%s\""
  # 实体类包路径
  type-aliases-package: com.user.entity
  # Mapper XML 文件位置
  mapper-locations: classpath*:mapper/*.xml

